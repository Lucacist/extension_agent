<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdBlocker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      padding: 0;
      border: none;
    }

    .container {
      background: white;
      padding: 24px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: 600;
      color: #495057;
      margin-bottom: 8px;
      font-size: 14px;
    }

    select,
    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.2s;
      font-family: inherit;
    }

    select:focus,
    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }

    .btn:active {
      transform: translateY(0);
    }

    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      display: none;
    }

    .status.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .help-text {
      font-size: 12px;
      color: #6c757d;
      margin-top: 6px;
    }

    .glass {
      position: relative;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(2px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 2rem;
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.2),
        inset 0 4px 20px rgba(255, 255, 255, 0.3);
    }
  </style>
</head>

<body class="glass">
  <div class="container">

    <form id="config-form">
      <div class="form-group">
        <label for="api-provider">Fournisseur d'API</label>
        <select id="api-provider" name="apiProvider">
          <option value="openai">OpenAI (ChatGPT)</option>
          <option value="anthropic">Anthropic (Claude)</option>
          <option value="gemini">Google (Gemini)</option>
        </select>
      </div>

      <div class="form-group">
        <label for="api-key">Clé API</label>
        <input type="password" id="api-key" name="apiKey" placeholder="sk-..." required>
        <div class="help-text">Votre clé API est stockée localement et de manière sécurisée</div>
      </div>

      <div class="form-group">
        <label for="model">Modèle</label>
        <select id="model" name="model">
          <option value="gpt-3.5-turbo">GPT-3.5 Turbo (Rapide)</option>
          <option value="gpt-4">GPT-4 (Plus précis)</option>
          <option value="gpt-4-turbo">GPT-4 Turbo</option>
        </select>
      </div>

      <button type="submit" class="btn">Enregistrer</button>

      <div id="status" class="status"></div>
    </form>
  </div>

  <script src="popup.js"></script>
</body>

</html>
