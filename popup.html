<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Blocker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px; /* Un peu plus large pour le confort */
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      color: #fff;
      min-height: 400px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 20px;
      background-color: #1a1a2e;
    }

    /* L'effet Glassmorphism amélioré */
    .glass-container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
      font-weight: 500;
    }

    input, select {
      width: 100%;
      padding: 12px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      transition: all 0.3s ease;
      outline: none;
    }

    input:focus, select:focus {
      border-color: #667eea;
      background: rgba(0, 0, 0, 0.4);
      box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
    }

    /* Style spécifique pour les options du select (souvent blanc par défaut) */
    select option {
      background-color: #1a1a2e;
      color: white;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 10px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(118, 75, 162, 0.4);
    }

    .btn:active {
      transform: translateY(0);
    }

    .help-text {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 6px;
    }

    .status {
      margin-top: 16px;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      text-align: center;
      display: none;
    }

    .status.success {
      background: rgba(16, 185, 129, 0.2);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .status.error {
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }
  </style>
</head>

<body>
  <div class="glass-container">
    <h2>Configuration AdBlocker</h2>

    <form id="config-form">
      <!-- Fournisseur supprimé car géré automatiquement -->

      <div class="form-group">
        <label for="api-key">Clé AdBlocker</label>
        <input type="password" id="api-key" name="apiKey" placeholder="AIza..." required>
        <div class="help-text">Votre clé est stockée localement</div>
      </div>

      <div class="form-group">
        <label for="model">Modèle de l'AdBlocker</label>
        <!-- Le contenu sera rempli par le JS -->
        <select id="model" name="model">
          <option value="" disabled selected>Chargement...</option>
        </select>
      </div>

      <button type="submit" class="btn">Enregistrer</button>

      <div id="status" class="status"></div>
    </form>
  </div>

  <script src="popup.js"></script>
</body>

</html>
